<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailConnect - Indian Railways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 bg-f3f4f6 dark:bg-gray-900 h-screen flex flex-col overflow-hidden transition-colors duration-200">

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
    
    <!-- MODAL CONTAINER (For Admin Add Train) -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true"></div>

    <!-- NAVIGATION -->
    <nav class="bg-slate-900 dark:bg-slate-950 text-white shadow-lg z-40 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                    <i class="fa-solid fa-train-subway text-blue-400 text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">RailConnect</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="nav-links" class="flex space-x-4"></div>
                    <button onclick="toggleTheme()" class="text-gray-300 hover:text-white focus:outline-none">
                        <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="app-root" class="flex-1 overflow-hidden p-0 relative bg-white dark:bg-gray-900 transition-colors duration-200 h-full"></main>

    <!-- LOGIC -->
    <script>
        const API_URL = 'http://127.0.0.1:5000/api';

        const state = {
            currentUser: null,
            trains: [], 
            users: [],  
            bookings: [], 
            stations: ['Mumbai', 'Delhi', 'Bangalore', 'Chennai', 'Kolkata', 'Ahmedabad', 'Pune', 'Jaipur', 'Lucknow'] 
        };

        // --- API FUNCTIONS ---
        async function fetchTrains() {
            try {
                const res = await fetch(`${API_URL}/trains`);
                state.trains = await res.json();
            } catch(e) { console.error("Failed to fetch trains", e); }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/users`);
                state.users = await res.json();
            } catch(e) { console.error("Failed to fetch users", e); }
        }

        async function fetchMyBookings() {
            if(!state.currentUser) return;
            try {
                const res = await fetch(`${API_URL}/bookings/${state.currentUser.user_id}`);
                state.bookings = await res.json();
            } catch(e) { console.error("Failed to fetch bookings", e); }
        }

        document.addEventListener('DOMContentLoaded', () => { renderMainLayout(); });

        function renderHome() {
            if (state.currentUser?.role === 'admin') { renderAdminDashboard(); } 
            else if (state.currentUser?.role === 'passenger') { renderPassengerDashboard(); } 
            else { renderMainLayout(); }
        }

        // ==========================================
        //  SPLIT-SCREEN ARCHITECTURE
        // ==========================================

        function renderMainLayout() {
            document.getElementById('app-root').innerHTML = `
                <div class="flex h-full w-full">
                    <!-- LEFT SIDE: STATIC (Never reloads) -->
                    <div class="hidden md:block md:w-1/2 h-full relative bg-cover bg-center" style="background-image: url('Image01.jpg');">
                        <div class="absolute inset-0 bg-gradient-to-r from-black/60 to-black/30"></div>
                        <div class="absolute bottom-10 left-10 p-8 text-white z-10">
                            <h1 class="text-5xl font-bold mb-4 leading-tight">Indian Railways</h1>
                            <p class="text-xl text-gray-200 font-light">Connect with the nation. Experience seamless travel.</p>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: DYNAMIC (Content swaps here) -->
                    <div class="w-full md:w-1/2 h-full bg-white dark:bg-gray-900 flex flex-col justify-center items-center p-8 md:p-16 transition-colors duration-200 relative overflow-y-auto">
                        <div id="auth-content" class="w-full max-w-sm fade-in">
                            <!-- Content injected by JS functions below -->
                        </div>
                        
                        <!-- Footer -->
                        <div class="absolute bottom-6 text-xs text-gray-400 dark:text-gray-600">
                            &copy; 2025 RailConnect System
                        </div>
                    </div>
                </div>`;
            
            // Load the default view
            renderAuthOptions();
            updateNav();
        }

        function renderAuthOptions() {
            const container = document.getElementById('auth-content');
            container.innerHTML = `
                <div class="text-center mb-10 fade-in">
                    <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors duration-200">
                        <i class="fa-solid fa-train-subway text-4xl text-blue-600 dark:text-blue-400"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
                    <p class="text-gray-500 dark:text-gray-400 mt-2">Please select your login type</p>
                </div>

                <div class="flex flex-col gap-4 fade-in">
                    <button onclick="renderLoginForm('passenger')" class="w-full group relative flex items-center justify-center py-4 px-6 bg-blue-600 hover:bg-blue-700 rounded-xl text-white shadow-lg transition-all transform hover:-translate-y-0.5 font-semibold text-lg">
                        <span class="absolute left-6"><i class="fa-solid fa-user text-blue-200"></i></span>
                        Login as Passenger
                    </button>

                    <button onclick="renderLoginForm('admin')" class="w-full group relative flex items-center justify-center py-4 px-6 border-2 border-gray-200 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-500 rounded-xl text-gray-700 dark:text-gray-200 bg-transparent hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-semibold text-lg">
                        <span class="absolute left-6"><i class="fa-solid fa-shield-halved text-gray-400 dark:text-gray-500"></i></span>
                        Login as Admin
                    </button>
                </div>

                <div class="mt-8 text-center fade-in">
                    <p class="text-gray-600 dark:text-gray-400">
                        Don't have an account? 
                        <button onclick="renderRegisterPage()" class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-semibold hover:underline ml-1 focus:outline-none">
                            Create one
                        </button>
                    </p>
                </div>
            `;
        }

        function renderLoginForm(type) {
            const container = document.getElementById('auth-content');
            const title = type === 'admin' ? 'Admin Login' : 'Passenger Sign In';
            
            container.innerHTML = `
                <div class="fade-in">
                    <button onclick="renderAuthOptions()" class="mb-8 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left text-xl"></i> <span class="text-sm font-medium">Back</span>
                    </button>

                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-gray-900 dark:text-white">${title}</h2>
                        <p class="text-gray-500 dark:text-gray-400 mt-2">Enter your credentials to continue</p>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username / ID</label>
                            <input type="text" id="login-username" class="w-full p-3.5 rounded-xl border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition-all" placeholder="Enter username">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                            <input type="password" id="login-password" class="w-full p-3.5 rounded-xl border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition-all" placeholder="Enter password">
                        </div>
                        <button onclick="handleLogin('${type}')" class="w-full py-3.5 px-4 rounded-xl text-white bg-blue-600 hover:bg-blue-700 font-semibold shadow-md hover:shadow-lg transition-all">
                            Login
                        </button>
                    </div>
                </div>
            `;
        }

        function renderRegisterPage() {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="flex h-full w-full fade-in">
                    <!-- LEFT SIDE: Registration Form -->
                    <div class="w-full md:w-1/2 h-full bg-white dark:bg-gray-900 flex items-center justify-center p-8 overflow-y-auto transition-colors duration-200">
                        <div class="w-full max-w-md">
                            <button onclick="renderMainLayout()" class="mb-6 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors flex items-center gap-2">
                                <i class="fa-solid fa-arrow-left"></i> Back
                            </button>
                            
                            <div class="mb-8">
                                <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Start Your Journey</h2>
                                <p class="text-gray-500 dark:text-gray-400 mt-2">Create your new passenger account</p>
                            </div>

                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Full Name</label>
                                    <input type="text" id="r-name" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Email Address</label>
                                    <input type="email" id="r-email" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Age</label>
                                        <input type="number" id="r-age" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Aadhar No</label>
                                        <input type="text" id="r-aadhar" maxlength="12" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="12 Digits">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Username</label>
                                    <input type="text" id="r-username" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Password</label>
                                    <input type="password" id="r-password" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Upper, Lower & Number">
                                </div>
                                <button onclick="handleRegister()" class="w-full mt-2 py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                                    Register Now
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: Image (White Bullet Train) -->
                    <div class="hidden md:block md:w-1/2 h-full relative bg-cover bg-center" style="background-image: url('Image02.jpg');">
                        <div class="absolute inset-0 bg-black/10"></div>
                        <div class="absolute bottom-10 right-10 text-right text-white p-6">
                            <h2 class="text-3xl font-bold">Fast & Secure</h2>
                            <p class="text-gray-200">Join thousands of passengers today.</p>
                        </div>
                    </div>
                </div>`;
        }

        // ==========================================
        //  DASHBOARDS & CORE LOGIC
        // ==========================================

        async function renderPassengerDashboard() {
            await fetchTrains();
            await fetchMyBookings();
            
            const stationOptions = state.stations.map(s => `<option value="${s}">${s}</option>`).join('');
            
            document.getElementById('app-root').innerHTML = `
                <div class="max-w-6xl mx-auto fade-in space-y-8 p-4 sm:p-8 h-full overflow-y-auto">
                    <div class="bg-slate-900 p-6 sm:p-10 text-white bg-cover bg-center rounded-2xl" style="background-image: url('https://images.unsplash.com/photo-1474487548417-781cb71495f3');">
                        <h1 class="text-3xl font-bold mb-8 relative z-10">Find Your Next Journey</h1>
                        <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 relative z-10">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <select id="search-source" class="w-full bg-slate-800 rounded-lg px-3 py-2"><option value="">From</option>${stationOptions}</select>
                                <select id="search-dest" class="w-full bg-slate-800 rounded-lg px-3 py-2"><option value="">To</option>${stationOptions}</select>
                                <input type="date" id="search-date" class="w-full bg-slate-800 rounded-lg px-3 py-2">
                                <button onclick="renderTrainsList()" class="w-full bg-blue-600 hover:bg-blue-500 rounded-lg py-2">Search</button>
                            </div>
                        </div>
                    </div>

                    <div id="train-list" class="grid grid-cols-1 gap-4">
                        ${state.trains.length > 0 
                            ? state.trains.map(t => renderTrainCard(t)).join('') 
                            : '<div class="bg-white dark:bg-gray-800 p-8 text-center rounded-xl"><p class="text-gray-500">No trains found. Try a different route.</p></div>'
                        }
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border dark:border-gray-700">
                            <h3 class="font-bold mb-4 text-gray-800 dark:text-white">Check PNR Status</h3>
                            <input type="text" id="pnr-input" placeholder="Enter PNR" class="w-full border rounded-lg px-4 py-2 mb-3 dark:bg-gray-700 dark:text-white">
                            <button onclick="checkPNR()" class="w-full bg-slate-900 text-white py-2 rounded-lg">Check</button>
                            <div id="pnr-result" class="mt-4 text-sm"></div>
                        </div>
                        <div class="md:col-span-2 bg-white dark:bg-gray-800 rounded-2xl p-6 border dark:border-gray-700">
                            <h3 class="font-bold mb-4 text-gray-800 dark:text-white">My Bookings</h3>
                            <div>
                                ${state.bookings.length ? state.bookings.map(b => `
                                    <div class="border-b py-3 dark:border-gray-700 flex justify-between">
                                        <span class="text-gray-800 dark:text-gray-200 font-medium">${b.train_name} (${b.train_number})</span>
                                        <span class="text-gray-500 text-sm">PNR: ${b.pnr} | Seat: ${b.seat_number}</span>
                                    </div>
                                `).join('') : '<p class="text-gray-500">No bookings found.</p>'}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        async function renderAdminDashboard() {
            await fetchTrains();
            await fetchUsers();

            document.getElementById('app-root').innerHTML = `
                <div class="relative w-full h-full fade-in bg-gray-50 dark:bg-gray-900">
                    <!-- Admin Background -->
                    <div class="absolute inset-0 z-0 opacity-10" style="background-image: url('image_d5217c.png'); background-size: cover; background-position: center;"></div>
                    
                    <div class="relative z-10 max-w-7xl mx-auto space-y-6 p-4 sm:p-8 h-full overflow-y-auto">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Admin Dashboard</h1>
                            <button onclick="openAddTrainModal()" class="bg-slate-900 text-white px-4 py-2 rounded-lg shadow hover:bg-slate-800">Add New Train</button>
                        </div>

                        <!-- Stats -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border dark:border-gray-700">
                                <p class="text-gray-500 text-sm">Total Trains</p>
                                <p class="text-2xl font-bold text-gray-900 dark:text-white">${state.trains.length}</p>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border dark:border-gray-700">
                                <p class="text-gray-500 text-sm">Registered Users</p>
                                <p class="text-2xl font-bold text-gray-900 dark:text-white">${state.users.length}</p>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border dark:border-gray-700">
                                <p class="text-gray-500 text-sm">System Status</p>
                                <p class="text-2xl font-bold text-emerald-500">Operational</p>
                            </div>
                        </div>

                        <!-- Train Table -->
                        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 overflow-hidden">
                            <div class="p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800"><h3 class="font-bold text-gray-700 dark:text-gray-200">Train Schedule</h3></div>
                            <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-gray-700 dark:text-gray-300">
                                <thead class="bg-gray-50 dark:bg-gray-700"><tr><th class="px-6 py-3">Number</th><th class="px-6 py-3">Name</th><th class="px-6 py-3">Route</th><th class="px-6 py-3">Date/Time</th><th class="px-6 py-3">Seats</th><th class="px-6 py-3">Price</th><th class="px-6 py-3">Delay</th><th class="px-6 py-3">Actions</th></tr></thead>
                                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                                    ${state.trains.map(t => `<tr>
                                        <td class="px-6 py-4">${t.number}</td>
                                        <td class="px-6 py-4">${t.name}</td>
                                        <td class="px-6 py-4">${t.source}->${t.dest}</td>
                                        <td class="px-6 py-4">${t.date || 'Daily'} <br> ${t.time}</td>
                                        <td class="px-6 py-4 font-semibold text-blue-600 dark:text-blue-400">${t.seats}/${t.total_seats || 100}</td>
                                        <td class="px-6 py-4">₹${t.price || 0}</td>
                                        <td class="px-6 py-4 text-red-500">${t.delay > 0 ? t.delay + ' min' : '<span class="text-green-500">On Time</span>'}</td>
                                        <td class="px-6 py-4"><button onclick="deleteTrain(${t.train_id})" class="text-red-600 hover:text-red-800"><i class="fa-solid fa-trash"></i></button></td>
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderTrainCard(train) {
            const delayText = train.delay > 0 ? `<span class="text-red-500 text-xs font-bold ml-2"><i class="fa-solid fa-triangle-exclamation"></i> Delayed ${train.delay} min</span>` : '<span class="text-green-500 text-xs font-bold ml-2">On Time</span>';
            return `
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 flex flex-col sm:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow">
                    <div>
                        <h4 class="font-bold text-lg text-gray-900 dark:text-white">${train.name} <span class="text-sm text-blue-600 bg-blue-50 px-2 py-1 rounded ml-2">${train.number}</span></h4>
                        <div class="text-sm text-gray-500 mt-1">${train.source} <i class="fa-solid fa-arrow-right mx-2"></i> ${train.dest} | ${train.time} ${delayText}</div>
                        <div class="text-sm font-semibold text-gray-700 dark:text-gray-300 mt-2">Price: ₹${train.price || 0}</div>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <div class="text-sm font-bold ${train.seats < 10 ? 'text-red-500' : 'text-green-500'}">${train.seats} Seats</div>
                        <button onclick="bookTrain(${train.train_id})" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow-sm transition-colors">Book</button>
                    </div>
                </div>`;
        }

        // --- ACTIONS & MODALS ---

        function openAddTrainModal() {
            const modal = document.getElementById('modal-container');
            const options = state.stations.map(s => `<option value="${s}">${s}</option>`).join('');
            // Date Input Restriction: min = today
            const today = new Date().toISOString().split('T')[0];
            
            modal.innerHTML = `
                <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
                    <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75"></div>
                    <span class="hidden sm:inline-block sm:align-middle sm:h-screen"></span>
                    <div class="inline-block overflow-hidden text-left align-bottom bg-white dark:bg-gray-800 rounded-lg shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                        <div class="px-4 pt-5 pb-4 bg-white dark:bg-gray-800 sm:p-6 sm:pb-4">
                            <h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white mb-4">Add New Train</h3>
                            <div class="grid gap-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" id="nt-num" placeholder="Train No (e.g., 12951)" class="p-2 border rounded dark:bg-gray-700 dark:text-white">
                                    <input type="text" id="nt-name" placeholder="Train Name" class="p-2 border rounded dark:bg-gray-700 dark:text-white">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <select id="nt-source" class="p-2 border rounded dark:bg-gray-700 dark:text-white"><option value="">Source</option>${options}</select>
                                    <select id="nt-dest" class="p-2 border rounded dark:bg-gray-700 dark:text-white"><option value="">Destination</option>${options}</select>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs text-gray-500">Journey Date</label>
                                        <input type="date" id="nt-date" min="${today}" class="p-2 border rounded dark:bg-gray-700 dark:text-white w-full">
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-500">Departure Time</label>
                                        <input type="time" id="nt-time" class="p-2 border rounded dark:bg-gray-700 dark:text-white w-full">
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="number" id="nt-seats" placeholder="Total Seats" class="p-2 border rounded dark:bg-gray-700 dark:text-white">
                                    <input type="number" id="nt-price" placeholder="Price (₹)" class="p-2 border rounded dark:bg-gray-700 dark:text-white">
                                </div>
                                <div class="grid grid-cols-1 gap-4">
                                    <label class="text-sm text-gray-600 dark:text-gray-400">Delay (Minutes) - Custom Input</label>
                                    <input type="number" id="nt-delay" placeholder="0 for On Time, 15 for 15min late" class="p-2 border rounded dark:bg-gray-700 dark:text-white">
                                </div>
                            </div>
                        </div>
                        <div class="px-4 py-3 bg-gray-50 dark:bg-gray-700 sm:px-6 sm:flex sm:flex-row-reverse">
                            <button type="button" onclick="submitNewTrain()" class="w-full inline-flex justify-center px-4 py-2 text-base font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-sm hover:bg-blue-700 sm:ml-3 sm:w-auto sm:text-sm">Save</button>
                            <button type="button" onclick="document.getElementById('modal-container').classList.add('hidden')" class="mt-3 w-full inline-flex justify-center px-4 py-2 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancel</button>
                        </div>
                    </div>
                </div>`;
            modal.classList.remove('hidden');
        }

        function submitNewTrain() {
            const num = document.getElementById('nt-num').value;
            const name = document.getElementById('nt-name').value;
            const src = document.getElementById('nt-source').value;
            const dest = document.getElementById('nt-dest').value;
            const date = document.getElementById('nt-date').value;
            const time = document.getElementById('nt-time').value;
            const seats = document.getElementById('nt-seats').value;
            const price = document.getElementById('nt-price').value;
            const delay = document.getElementById('nt-delay').value || 0;

            if(!num || !name || !src || !dest || !date || !time || !seats || !price) {
                showToast("Please fill all required fields", 'error');
                return;
            }

            fetch(`${API_URL}/trains/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    number: num, 
                    name: name, 
                    source: src, 
                    dest: dest, 
                    date: date, 
                    time: time, 
                    seats: seats,
                    price: price,
                    delay: delay,
                    status: delay > 0 ? 'Delayed' : 'On Time' 
                })
            }).then(res => res.json()).then(data => {
                if(data.success) { 
                    showToast("Train Added Successfully"); 
                    document.getElementById('modal-container').classList.add('hidden');
                    renderAdminDashboard(); 
                }
                else showToast("Failed to add train", 'error');
            });
        }
        
        function deleteTrain(trainId) {
            if(confirm("Are you sure you want to delete this train?")) {
                 fetch(`${API_URL}/trains/delete/${trainId}`, {
                    method: 'DELETE',
                }).then(res => res.json()).then(data => {
                    if(data.success) {
                        showToast("Train Deleted");
                        renderAdminDashboard();
                    } else {
                        showToast("Failed to delete train", 'error');
                    }
                });
            }
        }

        // --- LOGIN & REGISTER LOGIC ---
        async function handleLogin(role) {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            const data = { username, password, role };
            
            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await res.json();
                if (result.success) {
                    state.currentUser = result.user;
                    updateNav();
                    role === 'admin' ? renderAdminDashboard() : renderPassengerDashboard();
                    showToast(`Welcome, ${result.user.full_name || 'User'}`);
                } else { showToast(result.message, 'error'); }
            } catch(e) { showToast("Connection Error", 'error'); }
        }

        async function handleRegister() {
            const name = document.getElementById('r-name').value;
            const email = document.getElementById('r-email').value;
            const age = document.getElementById('r-age').value;
            const aadhar = document.getElementById('r-aadhar').value;
            const username = document.getElementById('r-username').value;
            const password = document.getElementById('r-password').value;

            // 1. Aadhar Validation (Only integers, exact length 12)
            const aadharRegex = /^\d{12}$/;
            if (!aadharRegex.test(aadhar)) {
                showToast("Aadhar must be exactly 12 numeric digits", 'error');
                return;
            }

            // 2. Password Validation (Upper, Lower, Number)
            const passwordRegex = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{4,}$/;
            if (!passwordRegex.test(password)) {
                showToast("Password must have Uppercase, Lowercase & Number", 'error');
                return;
            }

            const data = { name, email, age, aadhar, username, password };
            
            const res = await fetch(`${API_URL}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) { showToast('Registration Successful!'); renderLoginForm('passenger'); } 
            else showToast(result.message, 'error');
        }

        async function bookTrain(trainId) {
            const pnr = 'PNR' + Math.floor(100000 + Math.random() * 900000);
            const data = {
                trainId: trainId,
                userId: state.currentUser.user_id,
                pnr: pnr,
                date: document.getElementById('search-date') ? document.getElementById('search-date').value : new Date().toISOString().split('T')[0],
                seat: Math.floor(Math.random() * 100) + 1
            };
            const res = await fetch(`${API_URL}/book`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) { showToast(`Booking Confirmed! PNR: ${pnr}`); renderPassengerDashboard(); }
            else { showToast(result.message, 'error'); }
        }

        async function checkPNR() {
            const pnr = document.getElementById('pnr-input').value;
            const div = document.getElementById('pnr-result');
            if(!pnr) return;
            const res = await fetch(`${API_URL}/pnr/${pnr}`);
            const result = await res.json();
            if (result.success) {
                const b = result.data;
                div.innerHTML = `<div class="bg-green-100 p-3 rounded text-green-800 font-medium mt-2 border border-green-300">${b.train_name} (${b.train_number})<br>Seat: ${b.seat_number} | Status: ${b.status}</div>`;
            } else {
                div.innerHTML = `<div class="bg-red-100 p-3 rounded text-red-800 font-medium mt-2 border border-red-300">PNR Not Found</div>`;
            }
        }

        function updateNav() {
            const nav = document.getElementById('nav-links');
            if (state.currentUser) {
                nav.innerHTML = `<span class="text-sm text-gray-300">Hello, ${state.currentUser.username}</span><button onclick="logout()" class="ml-4 bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm transition-colors">Logout</button>`;
            } else { nav.innerHTML = ''; }
        }

        function logout() {
            state.currentUser = null;
            renderMainLayout(); // Go back to main options
        }

        function renderTrainsList() {
            const source = document.getElementById('search-source').value;
            const dest = document.getElementById('search-dest').value;
            const filtered = state.trains.filter(t => (!source || t.source === source) && (!dest || t.dest === dest));
            
            const container = document.getElementById('train-list');
            if(filtered.length === 0) {
                container.innerHTML = '<div class="bg-white dark:bg-gray-800 p-8 text-center rounded-xl w-full col-span-full"><p class="text-gray-500 dark:text-gray-400 text-lg">No trains available for this route.</p></div>';
            } else {
                container.innerHTML = filtered.map(t => renderTrainCard(t)).join('');
            }
        }

        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = `${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-6 py-3 rounded shadow-lg flex items-center gap-2 fade-in`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
